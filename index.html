<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coffee Overview</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .coffee { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; }
    h2 { margin: 0 0 5px; }
    .table-container {
  max-height: 400px;
  overflow-y: auto;
  max-width: 100%;
  overflow-x: auto;
  border: 1px solid #ccc;
  border-radius: 10px;
}

table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  white-space: nowrap;
}

thead th {
  position: sticky;
  top: 0;
  background: #f0f0f0;
  padding: 10px;
  border-bottom: 2px solid #999;
  text-align: left;
  z-index: 3;
}

.sticky-col {
  position: sticky;
  left: 0;
  background: #ffffff;
  z-index: 2;
}

tbody td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

  </style>
</head>
<body>

  <h1>My Coffee Collection</h1>
  <div class="table-container">
    <table id="coffee-table">
      <thead>
        <tr>
          <th class="sticky-col">Name</th>
          <th>Shop</th>
          <th>Origin</th>
          <th>Region</th>
          <th>Height (m)</th>
          <th>Botanic Variety</th>
          <th>Farm / Producer</th>
          <th>Processing Method</th>
          <th>SCA</th>
          <th>Flavor</th>
        </tr>
      </thead>
      <tbody id="coffee-body">
        <tr><td colspan="4">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/10NVColZhsKRWRUdpxmCzuWskvQzTSlFakOhRA8xFY5Y/export?format=csv';
    
    Papa.parse(sheetUrl, {
    download: true,
    header: true,
    complete: function(results) {
      const data = results.data;
      const tbody = document.getElementById("coffee-body");
      tbody.innerHTML = '';

      data.forEach(coffee => {
        if (coffee.Name) {
          const row = `
            <tr>
              <td class="sticky-col">${coffee["Name"]}</td>
              <td>${coffee["Shop"]}</td>
              <td>${coffee["Origin"]}</td>
              <td>${coffee["Region"]}</td>
              <td>${coffee["Height (m)"]}</td>
              <td>${coffee["Botanic Variety"]}</td>
              <td>${coffee["Farm / Producer"]}</td>
              <td>${coffee["Processing Method"]}</td>
              <td>${coffee["SCA"]}</td>
              <td>${coffee["Flavor"]}</td>
            </tr>`;
          tbody.innerHTML += row;
        }
      });
    }
  });
</script>

</body>
</html>
