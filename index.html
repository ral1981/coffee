<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coffee Overview</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .coffee { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; }
    h2 { margin: 0 0 5px; }
    .table-container {
      overflow: auto;
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      white-space: nowrap;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #f0f0f0;
      border-bottom: 2px solid #999;
      text-align: left;
      z-index: 2;
    }
    thead th:first-child {
      background: #f0f0f0;
    }
    .in-green {
      background-color: #e0f7e9;
    }
    .in-grey {
      background-color: #eeeeee;
    }
    .sticky-col {
      position: sticky;
      left: 0;
      background-color: inherit;
      z-index: 1;
    }
    .sticky-col.sticky-header {
      z-index: 5;
    }
    tbody td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    .icon-link {
      text-decoration: none;
      margin-left: 5px;
    }
  </style>
</head>
<body>
  <h1>My Coffee Collection</h1>
  <div class="table-container">
    <table id="coffee-table">
      <thead>
        <tr>
          <th class="sticky-col sticky-header" rowspan="2">Name</th>
          <th rowspan="2">Shop</th>
          <th rowspan="2">Origin</th>
          <th rowspan="2">Region</th>
          <th rowspan="2">Height (m)</th>
          <th rowspan="2">Botanic Variety</th>
          <th rowspan="2">Farm / Producer</th>
          <th rowspan="2">Processing Method</th>
          <th rowspan="2">SCA</th>
          <th rowspan="2">Flavor</th>
          <th colspan="5">Recipe</th>
        </tr>
        <tr>
          <th>Ratio</th>
          <th>In (gr)</th>
          <th>Out (gr)</th>
          <th>Time (s)</th>
          <th>Temperature (°C)</th>
        </tr>
      </thead>
      <tbody id="coffee-body">
      </tbody>
    </table>
  </div>
  <script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/10NVColZhsKRWRUdpxmCzuWskvQzTSlFakOhRA8xFY5Y/export?format=csv';

    fetch(sheetUrl)
      .then(response => response.text())
      .then(csv => {
        const parsed = Papa.parse(csv, { header: true });
        const tbody = document.getElementById('coffee-body');

        parsed.data.forEach(coffee => {
          if (!coffee["Name"]) return; // Skip empty rows
          let containerClass = '';
          let iconColor = '';
          let containerUrl = '#';

          if (coffee["Container"] === "green") {
            containerClass = 'in-green';
            iconColor = 'green';
            containerUrl = 'https://ral1981.github.io/coffee/container_01';
          } else if (coffee["Container"] === "grey") {
            containerClass = 'in-grey';
            iconColor = 'grey';
            containerUrl = 'https://ral1981.github.io/coffee/container_02';
          }

          const iconHTML = `<a href="${containerUrl}" class="icon-link" target="_blank" title="Container: ${coffee["Container"]}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="${iconColor}" viewBox="0 0 24 24">
              <path d="M3.783,2.836c-0.111,3.525 -0.355,7.048 -0.334,10.575c0.005,0.147 0.131,0.267 0.276,0.269l6.71,0l-0.343,-10.829c-2.102,0.032 -4.206,-0.01 -6.309,-0.015Zm7.075,0c-0.112,0.003 -0.223,0.006 -0.334,0.008l0.332,10.494l0.346,-0.384c0.026,-0.026 0.033,-0.043 0.113,-0.066l0.599,-0.134l-1.056,-9.918Zm-1.807,3.199c0.257,0.019 0.468,0.229 0.487,0.487c0.029,1.16 0.001,2.32 0.001,3.48c-0.007,0.265 -0.221,0.49 -0.488,0.51c-1.401,0.035 -2.803,0 -4.204,0c-0.265,-0.006 -0.49,-0.22 -0.51,-0.487c-0.029,-1.16 0,-2.32 0,-3.48c0.006,-0.265 0.22,-0.49 0.487,-0.51c0.026,-0.001 0.08,-0.002 0.08,-0.002l4.069,0c0,0 0.052,0.001 0.078,0.002Zm-4.198,0.431c-0.046,0.001 -0.081,0.035 -0.085,0.077c-0.028,1.155 -0.085,2.313 0.001,3.464c0.005,0.04 0.038,0.071 0.077,0.074c0.024,0 0.075,0.001 0.075,0.001l4.027,0.004c0,0 0.057,-0.004 0.085,-0.006c0.039,-0.004 0.071,-0.037 0.074,-0.077c0.028,-1.154 0.085,-2.312 -0.001,-3.464c-0.005,-0.039 -0.038,-0.07 -0.077,-0.073c-1.391,-0.034 -2.784,0 -4.176,0Zm2.799,0.651c0.119,0.067 0.223,0.158 0.303,0.271c0.586,0.834 -0.271,2.408 -1.396,2.097c-0.074,-0.02 -0.146,-0.05 -0.213,-0.089c-0.058,-0.034 -0.113,-0.074 -0.163,-0.12c-0.76,-0.702 -0.09,-2.3 1.041,-2.28c0.149,0.007 0.294,0.048 0.422,0.118c0.002,0.001 0.004,0.002 0.006,0.003Zm-0.047,0.543c-0.268,0.481 -0.552,0.953 -0.831,1.428c0.457,0.041 0.938,-0.473 0.945,-1.03c0.001,-0.136 -0.037,-0.282 -0.114,-0.398Zm-0.373,-0.231c-0.018,-0.001 -0.035,-0.002 -0.054,-0.002c-0.651,0.025 -1.115,1.002 -0.788,1.451c0.271,-0.488 0.56,-0.967 0.842,-1.449Zm-3.786,-5.749l7.39,0l-0.005,0.723l-0.53,0l0,0l-6.727,0l0,0l-0.128,0l0,-0.723Z"/>
            </svg>
          </a>`;

          const row = document.createElement('tr');
          row.className = containerClass;
          row.innerHTML = `
            <td class="sticky-col ${containerClass}">
              ${coffee["Name"] || ''} ${iconHTML}
            </td>
            <td><a href="${coffee['Shop URL'] || '#'}" target="_blank">${coffee["Shop Name"] || ''}</a></td>
            <td>${coffee["Origin"] || ''}</td>
            <td>${coffee["Region"] || ''}</td>
            <td>${coffee["Height (m)"] || ''}</td>
            <td>${coffee["Botanic Variety"] || ''}</td>
            <td>${coffee["Farm / Producer"] || ''}</td>
            <td>${coffee["Processing Method"] || ''}</td>
            <td>${coffee["SCA"] || ''}</td>
            <td>${coffee["Flavor"] || ''}</td>
            <td>${coffee["Recipe: Ratio"] || ''}</td>
            <td>${coffee["Recipe: In (gr)"] || ''}</td>
            <td>${coffee["Recipe: Out (gr)"] || ''}</td>
            <td>${coffee["Recipe: Time (s)"] || ''}</td>
            <td>${coffee["Recipe: Temperature (°C)"] || ''}</td>
          `;
          tbody.appendChild(row);
        });
      });
  </script>
</body>
</html>
