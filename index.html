<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Inventory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 1em;
      font-size: 1.1em;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      background-color: white;
      padding: 1em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1em;
    }

    th, td {
      padding: 1em;
      text-align: left;
      border-bottom: 1px solid #ddd;
      min-width: 100px;
    }

    thead th {
      background-color: #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .green { background-color: #e0f7e9; }
    .grey { background-color: #f0f0f0; }

    .container-icon svg {
      width: 24px;
      height: 24px;
    }

    .sticky-col {
      position: sticky;
      left: 0;
      background-color: white;
      z-index: 1;
    }

    @media (max-width: 768px) {
      body {
        font-size: 1.2em;
      }
      th, td {
        padding: 1.2em;
        font-size: 1.1em;
      }
      .container-icon svg {
        width: 28px;
        height: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="table-container">
    <table id="coffee-table">
      <thead>
        <tr>
          <th class="sticky-col">Name</th>
          <th>Shop</th>
          <th>Origin</th>
          <th>Container</th>
          <th>Flavors</th>
          <th>Variety</th>
          <th>Process</th>
          <th>Elevation</th>
          <th>Producer</th>
          <th>Roast</th>
          <th>Recipe: Ratio</th>
          <th>Recipe: Time</th>
          <th>Recipe: Temp</th>
        </tr>
      </thead>
      <tbody id="coffee-body"></tbody>
    </table>
  </div>
  <script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRa2rj3UunCQzNddDbcAcGpmmNvPu73JatZPbXzRQeWAA_4CL6ErkD2EtKrh31pZw/pub?gid=0&single=true&output=csv';
    const icons = {
      green: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h.008v.008H10.5V6Zm0 4.5h.008v.008H10.5V10.5Zm0 4.5h.008v.008H10.5V15Zm3-9h.008v.008H13.5V6Zm0 4.5h.008v.008H13.5V10.5Zm0 4.5h.008v.008H13.5V15Zm3-9h.008v.008H16.5V6Zm0 4.5h.008v.008H16.5V10.5Zm0 4.5h.008v.008H16.5V15ZM6.75 18h10.5a.75.75 0 010 1.5H6.75a.75.75 0 010-1.5Z"/></svg>`
    };

    fetch(sheetUrl)
      .then(response => response.text())
      .then(csv => Papa.parse(csv, { header: true }))
      .then(data => {
        const tbody = document.getElementById('coffee-body');
        data.data.forEach(coffee => {
          if (!coffee["Name"]) return;
          const row = document.createElement('tr');

          if (coffee.Container.toLowerCase() === 'green') {
            row.classList.add('green');
          } else if (coffee.Container.toLowerCase() === 'grey') {
            row.classList.add('grey');
          }

          row.innerHTML = `
            <td class="sticky-col">${coffee["Name"]}</td>
            <td>${coffee["Shop"]}</td>
            <td>${coffee["Origin"]}</td>
            <td class="container-icon">${coffee.Container.toLowerCase() === 'green' ? `<a href="${coffee.URL}" target="_blank" title="View container">${icons.green}</a>` : coffee.Container}</td>
            <td>${coffee["Flavors"]}</td>
            <td>${coffee["Variety"]}</td>
            <td>${coffee["Process"]}</td>
            <td>${coffee["Elevation"]}</td>
            <td>${coffee["Producer"]}</td>
            <td>${coffee["Roast"]}</td>
            <td>${coffee["Recipe: Ratio"]}</td>
            <td>${coffee["Recipe: Time"]}</td>
            <td>${coffee["Recipe: Temperature (°C)"]}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(err => {
        document.getElementById('coffee-body').innerHTML = `<tr><td colspan="13">Error loading coffee data.</td></tr>`;
        console.error(err);
      });
  </script>
</body>

</html>
