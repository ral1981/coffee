<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0"
          name="viewport">
    <title>Coffee Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
          rel="stylesheet">
    <link href="styles.css"
          rel="stylesheet">
</head>
<body>
    <header>
        <img src="headerBeans.svg" alt="header beans" class="header-beans" />        
        <h1>Coffee Tracker</h1>
          <p class="subtitle">Specialty Coffee Beans</p>
    </header>
    <div class="add-coffee-section">
        <div class="add-coffee-container">
            <button aria-expanded="false"
                 class="add-coffee-toggle"
                 disabled
                 id="add-coffee-toggle"
                 onclick="toggleAddCoffee()"><span>Add Coffee</span></button>
            <div class="add-coffee-content collapsed"
                 id="add-coffee-content">
                <div class="add-coffee-grid">
                    <form id="add-coffee-form"
                          name="add-coffee-form"
                          onsubmit="submitNewCoffee(event)">
                        <div class="form-sections">
                            <!-- Basic Information Section -->
                            <div class="form-section">
                                <h3>Basic Information</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-container">Container</label> <select id="add-container"
                                             name="container">
                                            <option value="">
                                                Select Container
                                            </option>
                                            <option value="green">
                                                Green Container
                                            </option>
                                            <option value="grey">
                                                Grey Container
                                            </option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="add-name">Coffee Name <span class="required">*</span></label> <input id="add-name"
                                             name="name"
                                             placeholder="Enter coffee name"
                                             required=""
                                             type="text">
                                    </div>
                                </div>
                            </div><!-- Shop Information Section -->
                            <div class="form-section">
                                <h3>Shop Information</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-shop-name">Shop Name <span class="required">*</span></label> <input id="add-shop-name"
                                             name="shop_name"
                                             placeholder="Enter shop name"
                                             required=""
                                             type="text">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-shop-url">Shop URL <span class="required">*</span></label> <input id="add-shop-url"
                                             name="shop_url"
                                             onblur="ensureHttps()"
                                             oninput="updateFavicon()"
                                             placeholder="https://example.com"
                                             required=""
                                             type="url">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-shop-logo">Shop Logo URL (Favicon)</label>
                                        <div class="favicon-input-container">
                                            <input id="add-shop-logo"
                                                 name="shop_logo"
                                                 placeholder="Auto-populated from Shop URL"
                                                 readonly
                                                 type="url">
                                            <div class="favicon-preview"
                                                 id="favicon-preview">
                                                <img alt="Favicon"
                                                     id="favicon-img"
                                                     onerror="this.style.display='none'"
                                                     src=""
                                                     style="display: none;"> <i data-lucide="image"
                                                     id="favicon-placeholder"
                                                     style="width: 16px; height: 16px; color: #9ca3af;"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div><!-- Origin Information Section -->
                            <div class="form-section">
                                <h3>Origin Information</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-origin">Origin <span class="required">*</span></label> <input id="add-origin"
                                             name="origin"
                                             placeholder="e.g., Ethiopia"
                                             required=""
                                             type="text">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-region">Region</label> <input id="add-region"
                                             name="region"
                                             placeholder="e.g., Yirgacheffe"
                                             type="text">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-height">Height (m)</label> <input id="add-height"
                                             name="height_m"
                                             placeholder="e.g., 1800"
                                             type="number">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-variety">Botanic Variety</label> <input id="add-variety"
                                             name="botanic_variety"
                                             placeholder="e.g., Heirloom"
                                             type="text">
                                    </div>
                                </div>
                            </div><!-- Production Information Section -->
                            <div class="form-section">
                                <h3>Production Information</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-farm">Farm / Producer</label> <input id="add-farm"
                                             name="farm_producer"
                                             placeholder="Enter farm or producer name"
                                             type="text">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-processing">Processing Method</label> <input id="add-processing"
                                             name="processing_method"
                                             placeholder="e.g., Washed, Natural"
                                             type="text">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-sca">SCA Score</label> <input id="add-sca"
                                             max="100"
                                             min="0"
                                             name="sca"
                                             placeholder="e.g., 85.5"
                                             step="0.1"
                                             type="number">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-flavor">Flavor Profile</label> 
                                        <textarea id="add-flavor"
                                             name="flavor"
                                             placeholder="Describe the flavor notes"
                                             rows="2"></textarea>
                                    </div>
                                </div>
                            </div><!-- Recipe Information Section -->
                            <div class="form-section">
                                <h3>Espresso Recipe (double shot)</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-recipe-in">In (gr)</label> <input id="add-recipe-in"
                                             name="recipe_in_gr"
                                             onchange="calculateRatio()"
                                             placeholder="18"
                                             step="0.1"
                                             type="number">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-recipe-out">Out (gr)</label> <input id="add-recipe-out"
                                             name="recipe_out_gr"
                                             onchange="calculateRatio()"
                                             placeholder="36"
                                             step="0.1"
                                             type="number">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-recipe-ratio">Ratio (auto-calculated)</label> <input id="add-recipe-ratio"
                                             name="recipe_ratio"
                                             placeholder="1:2"
                                             readonly
                                             type="text">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-recipe-time">Time (s)</label> <input id="add-recipe-time"
                                             name="recipe_time_s"
                                             placeholder="28"
                                             type="number">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-recipe-temp">Temperature (°C)</label> <input id="add-recipe-temp"
                                             name="recipe_temperature_c"
                                             placeholder="93"
                                             type="number">
                                    </div>
                                </div>
                            </div><!-- Form Actions -->
                            <div class="form-actions">
                                <button class="btn-cancel"
                                     onclick="resetAddCoffeeForm()"
                                     type="button">Cancel</button> <button class="btn-submit"
                                     type="submit"> Add Coffee</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="filters-section">
        <div class="filters-container">
            <button aria-expanded="false"
                 class="filters-toggle"
                 onclick="toggleFilters()"><span>Filter Coffee Collection</span></button>
            <div class="filters-content collapsed"
                 id="filters-content">
                <div class="filters-grid">
                    <div class="filter-group">
                        <label for="container-filter">Container:</label> <select id="container-filter"
                             onchange="applyFilters()">
                            <option value="">
                                All Containers
                            </option>
                            <option value="green">
                                Green Container
                            </option>
                            <option value="grey">
                                Grey Container
                            </option>
                            <option value="none">
                                Not in Container
                            </option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="shop-filter">Shop:</label> <select id="shop-filter"
                             onchange="applyFilters()">
                            <option value="">
                                All Shops
                            </option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="origin-filter">Origin:</label> <select id="origin-filter"
                             onchange="applyFilters()">
                            <option value="">
                                All Origins
                            </option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button class="clear-filters-btn"
                             disabled
                             id="clear-filters-btn"
                             onclick="clearAllFilters()">Clear All Filters</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="results-count"
         id="results-count"></div>
    <div class="coffee-grid"
         id="coffee-grid">
        <!-- Coffee cards will be populated by JavaScript -->
    </div>
    <div class="no-results"
         id="no-results"
         style="display: none;">
        <h3>No coffee found</h3>
        <p>Try adjusting your filters to see more results.</p>
    </div><button aria-label="Back to top"
          class="back-to-top"
          id="back-to-top"
          onclick="scrollToTop()"></button>
 
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script> 
    <script> lucide.createIcons();</script>
    <script src="app.js"></script>
</body>
</html>
