<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coffee Overview</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .coffee { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; }
    h2 { margin: 0 0 5px; }
  </style>
</head>
<body>

  <h1>My Coffee Collection</h1>
  <div id="coffee-list">Loading...</div>

  <script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/1wUHT2YjpM6kb2Ikc-uL7sV9EBTff-LFuz5pBlZ-7zy0/export?format=csv';
    
    Papa.parse(sheetUrl, {
      download: true,
      header: true,
      complete: function(results) {
        const data = results.data;
        const container = document.getElementById("coffee-list");
        container.innerHTML = '';

        data.forEach(coffee => {
          if (coffee.Name) { // skip empty rows
            container.innerHTML += `
              <div class="coffee">
                <h2>${coffee.Name}</h2>
                <p><strong>Origin:</strong> ${coffee.Origin}</p>
                <p><strong>Notes:</strong> ${coffee.Notes}</p>
                <p><strong>Roast:</strong> ${coffee.Roast}</p>
              </div>`;
          }
        });
      }
    });
  </script>

</body>
</html>
