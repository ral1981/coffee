<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coffee Notes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

  <!-- HTML content -->
  <textarea id="notes-input-0" placeholder="Write your coffee notes..."></textarea>
  <button id="save-btn">Save Notes</button>

  <input type="email" id="email-input" placeholder="Enter your email" />
  <button id="login-btn">Send Login Link</button>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ✅ Init Supabase
      const supabase = supabase.createClient(
        'https://vrasvqmlpdqogghtkqfu.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyYXN2cW1scGRxb2dnaHRrcWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTAzNTQ5ODgsImV4cCI6MjA2NTkzMDk4OH0.K5wuITvCrQdCvfsRRpWZnFtZ3cvHLAdXhudBxiP9hAc'
      );

      // ✅ Demo coffee data
      const filteredCoffees = [{ id: '0019b7d7-9ea3-4569-91b0-b8cd4e1d45d2' }];
      const allCoffees = [...filteredCoffees];

      // ✅ Auth
      async function signIn() {
        const email = document.getElementById('email-input').value;
        const { error } = await supabase.auth.signInWithOtp({ email });
        if (error) alert('Login error: ' + error.message);
        else alert('Magic link sent!');
      }

      // ✅ Save notes
      async function saveNotes() {
        const notesInput = document.getElementById('notes-input-0');
        const newNotes = notesInput.value.trim();
        const coffeeId = filteredCoffees[0].id;

        const { data: { session } } = await supabase.auth.getSession();
        if (!session) return alert('Please log in first.');
        const token = session.access_token;

        const res = await fetch('http://localhost:3000/api/coffee-beans/notes', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ id: coffeeId, notes: newNotes })
        });

        const result = await res.json();
        if (result.success) alert('Notes saved!');
        else alert('Error: ' + result.error);
      }

      // ✅ Attach event listeners
      document.getElementById('login-btn').addEventListener('click', signIn);
      document.getElementById('save-btn').addEventListener('click', saveNotes);
    });
  </script>
</body>
</html>
