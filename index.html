<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coffee Overview</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .coffee { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; }
    h2 { margin: 0 0 5px; }
    .table-container {
      overflow: auto;
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    
    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
    }
    
    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      white-space: nowrap;
    }
    
    thead th {
      position: sticky;
      top: 0;
      background: #f0f0f0;
      padding: 10px;
      border-bottom: 2px solid #999;
      text-align: left;
      z-index: 2;
    }
    
    thead th:first-child {
      background: #f0f0f0;
    }
    
    .in-green {
      background-color: #e0f7e9;
    }
    .in-grey {
      background-color: #eeeeee;
    }
    
    .sticky-col {
      position: sticky;
      left: 0;
      background-color: inherit;
      z-index: 1;
    }
    
    .sticky-col.sticky-header {
      z-index: 5;
    }
    
    tbody td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    
    .icon-link {
      text-decoration: none;
      margin-left: 5px;
    }
  </style>
</head>
<body>
  
  <h1>My Coffee Collection</h1>
  <div class="table-container">
    <table id="coffee-table">
      <thead>
        <tr>
          <th class="sticky-col sticky-header" rowspan="2">Name</th>
          <th rowspan="2">Shop</th>
          <th rowspan="2">Origin</th>
          <th rowspan="2">Region</th>
          <th rowspan="2">Height (m)</th>
          <th rowspan="2">Botanic Variety</th>
          <th rowspan="2">Farm / Producer</th>
          <th rowspan="2">Processing Method</th>
          <th rowspan="2">SCA</th>
          <th rowspan="2">Flavor</th>
          <th colspan="5">Recipe</th>
        </tr>
        <tr>
          <th>Ratio</th>
          <th>In (gr)</th>
          <th>Out (gr)</th>
          <th>Time (s)</th>
          <th>Temperature (°C)</th>
        </tr>
      </thead>
      <tbody id="coffee-body">
      </tbody>
    </table>
  </div>
  
  <script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/10NVColZhsKRWRUdpxmCzuWskvQzTSlFakOhRA8xFY5Y/export?format=csv';

    fetch(sheetUrl)
      .then(response => response.text())
      .then(csv => {
        const parsed = Papa.parse(csv, { header: true });
        const tbody = document.getElementById('coffee-body');

        parsed.data.forEach(coffee => {
          if (!coffee["Name"]) return;
          
          let containerClass = '';
          let iconHTML = '';
          
          if (coffee["Container"] === "green") {
            containerClass = 'in-green';
            iconHTML = iconHTML = `<a href="https://ral1981.github.io/coffee/container_01" class="icon-link" target="_blank" title="Container: green">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="green" viewBox="0 0 24 24">
                <path d="M18.686,2.863h0.002l-0.002-0.002c-0.104-0.703-0.397-1.345-0.892-1.853C17.16,0.358,16.259,0,15.252,0
			c-1.353,0-2.767,0.621-3.878,1.704c-0.956,0.931-1.581,2.094-1.76,3.275c-0.059,0.39-0.068,0.767-0.028,1.125l0.01,0.082
			c0.098,0.744,0.407,1.402,0.908,1.917c0.633,0.65,1.536,1.009,2.542,1.009c0.001,0,0.001,0,0.001,0
			c1.352,0,2.765-0.621,3.878-1.704C18.285,6.083,18.902,4.34,18.686,2.863z M10.618,6.231c-0.067-0.34-0.073-0.711-0.015-1.102
			c0.146-0.968,0.667-1.93,1.467-2.708C12.999,1.518,14.157,1,15.252,1c0.744,0,1.376,0.244,1.824,0.706
			c0.042,0.043,0.081,0.087,0.119,0.133c-0.265-0.117-0.64-0.234-1.086-0.234c-0.985,0-2.381,0.576-3.409,3.294
			c-0.601,1.33-1.348,1.402-1.51,1.402L10.618,6.231z M15.124,2.953c-0.361,0.451-0.683,1.087-1.128,1.969l-0.128,0.254
			c-0.221,0.438-0.535,0.929-0.938,1.222c0.242-0.278,0.479-0.643,0.693-1.116C14.052,4.154,14.56,3.37,15.124,2.953z M16.228,6.69
			C15.3,7.593,14.14,8.111,13.047,8.111c-0.722,0-1.335-0.229-1.781-0.662c0.237,0.108,0.559,0.208,0.936,0.208
			c0.699,0,1.711-0.353,2.562-2.03l0.129-0.255c1.027-2.036,1.159-2.298,2.461-2.402l0.342-0.027
			C17.901,4.114,17.378,5.571,16.228,6.69z"/>
              </svg>
            </a>`;
          } else if (coffee["Container"] === "grey") {
            containerClass = 'in-grey';
            iconHTML = iconHTML = `<a href="https://ral1981.github.io/coffee/container_01" class="icon-link" target="_blank" title="Container: grey">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="grey" viewBox="0 0 24 24">
                <path d="M18.686,2.863h0.002l-0.002-0.002c-0.104-0.703-0.397-1.345-0.892-1.853C17.16,0.358,16.259,0,15.252,0
			c-1.353,0-2.767,0.621-3.878,1.704c-0.956,0.931-1.581,2.094-1.76,3.275c-0.059,0.39-0.068,0.767-0.028,1.125l0.01,0.082
			c0.098,0.744,0.407,1.402,0.908,1.917c0.633,0.65,1.536,1.009,2.542,1.009c0.001,0,0.001,0,0.001,0
			c1.352,0,2.765-0.621,3.878-1.704C18.285,6.083,18.902,4.34,18.686,2.863z M10.618,6.231c-0.067-0.34-0.073-0.711-0.015-1.102
			c0.146-0.968,0.667-1.93,1.467-2.708C12.999,1.518,14.157,1,15.252,1c0.744,0,1.376,0.244,1.824,0.706
			c0.042,0.043,0.081,0.087,0.119,0.133c-0.265-0.117-0.64-0.234-1.086-0.234c-0.985,0-2.381,0.576-3.409,3.294

			c-0.221,0.438-0.535,0.929-0.938,1.222c0.242-0.278,0.479-0.643,0.693-1.116C14.052,4.154,14.56,3.37,15.124,2.953z M16.228,6.69
			C15.3,7.593,14.14,8.111,13.047,8.111c-0.722,0-1.335-0.229-1.781-0.662c0.237,0.108,0.559,0.208,0.936,0.208
			c0.699,0,1.711-0.353,2.562-2.03l0.129-0.255c1.027-2.036,1.159-2.298,2.461-2.402l0.342-0.027
			C17.901,4.114,17.378,5.571,16.228,6.69z"/>
              </svg>
            </a>`;
          }

          const row = document.createElement('tr');
          row.className = containerClass;
          
          row.innerHTML = `
            <td class="sticky-col ${containerClass}">
              ${coffee["Name"] || ''} ${iconHTML}
            </td>
            <td><a href="${coffee['Shop URL'] || '#'}" target="_blank">${coffee["Shop Name"] || ''}</a></td>
            <td>${coffee["Origin"] || ''}</td>
            <td>${coffee["Region"] || ''}</td>
            <td>${coffee["Height (m)"] || ''}</td>
            <td>${coffee["Botanic Variety"] || ''}</td>
            <td>${coffee["Farm / Producer"] || ''}</td>
            <td>${coffee["Processing Method"] || ''}</td>
            <td>${coffee["SCA"] || ''}</td>
            <td>${coffee["Flavor"] || ''}</td>
            <td>${coffee["Recipe: Ratio"] || ''}</td>
            <td>${coffee["Recipe: In (gr)"] || ''}</td>
            <td>${coffee["Recipe: Out (gr)"] || ''}</td>
            <td>${coffee["Recipe: Time (s)"] || ''}</td>
            <td>${coffee["Recipe: Temperature (°C)"] || ''}</td>
          `;
          
          tbody.appendChild(row);
        });
      });
  </script>

</body>
</html>
