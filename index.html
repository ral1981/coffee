<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coffee Overview</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .coffee { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; }
    h2 { margin: 0 0 5px; }
    .table-container {
      overflow: auto;
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    
    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
    }
    
    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      white-space: nowrap;
    }
    
    thead th {
      position: sticky;
      top: 0;
      background: #f0f0f0;
      padding: 10px;
      border-bottom: 2px solid #999;
      text-align: left;
      z-index: 2;
    }
    
    thead th:first-child {
      background: #f0f0f0;
    }
    
    .in-green {
      background-color: #e0f7e9;
    }
    .in-grey {
      background-color: #eeeeee;
    }
    
    .sticky-col {
      position: sticky;
      left: 0;
      background-color: #fff;
      z-index: 1;
    }

    .in-green .sticky-col {
      background-color: #e0f7e9;
    }
    .in-grey .sticky-col {
      background-color: #eeeeee;
    }
    
	  .sticky-col.sticky-header {
      z-index: 5;
    }
    
    tbody td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    
    .icon-link {
      text-decoration: none;
      margin-left: 5px;
    }
  </style>
</head>
<body>
  
  <h1>My Coffee Collection</h1>
  <div class="table-container">
    <table id="coffee-table">
      <thead>
        <tr>
          <th class="sticky-col sticky-header" rowspan="2">Name</th>
          <th rowspan="2">Shop</th>
          <th rowspan="2">Origin</th>
          <th rowspan="2">Region</th>
          <th rowspan="2">Height (m)</th>
          <th rowspan="2">Botanic Variety</th>
          <th rowspan="2">Farm / Producer</th>
          <th rowspan="2">Processing Method</th>
          <th rowspan="2">SCA</th>
          <th rowspan="2">Flavor</th>
          <th colspan="5">Recipe</th>
        </tr>
        <tr>
          <th>Ratio</th>
          <th>In (gr)</th>
          <th>Out (gr)</th>
          <th>Time (s)</th>
          <th>Temperature (°C)</th>
        </tr>
      </thead>
      <tbody id="coffee-body">
      </tbody>
    </table>
  </div>
  
  <script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/10NVColZhsKRWRUdpxmCzuWskvQzTSlFakOhRA8xFY5Y/export?format=csv';

    fetch(sheetUrl)
      .then(response => response.text())
      .then(csv => {
        const parsed = Papa.parse(csv, { header: true });
        const tbody = document.getElementById('coffee-body');

        parsed.data.forEach(coffee => {
          if (!coffee["Name"]) return;

            containerClass = 'in-grey';
            iconHTML = `<a href="https://ral1981.github.io/coffee/container_01" class="icon-link" target="_self" title="Go to grey container">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="grey" viewBox="0 0 24 24">
                <path d="M356.771,61.341L374.313,0H137.686l17.544,61.341c-55.96,5.308-99.886,52.562-99.886,109.887v262.008

			<rect x="411.03" y="191.508" width="15.208" height="45.634"/>
			<path d="M346.263,91.254v15.208c35.714,0,64.768,29.054,64.768,64.766h15.208C426.24,127.13,390.362,91.254,346.263,91.254z"/>

          const row = document.createElement('tr');
          row.className = containerClass;
          
          row.innerHTML = `
            <td class="sticky-col ${containerClass}">
              ${coffee["Name"] || ''} ${iconHTML}
            </td>
            <td><a href="${coffee['Shop URL'] || '#'}" target="_blank">${coffee["Shop Name"] || ''}</a></td>

            <td>${coffee["SCA"] || ''}</td>
            <td>${coffee["Flavor"] || ''}</td>
            <td>${coffee["Recipe: Ratio"] || ''}</td>
            <td>${coffee["Recipe: In (gr)"] || ''}</td>
            <td>${coffee["Recipe: Out (gr)"] || ''}</td>
            <td>${coffee["Recipe: Time (s)"] || ''}</td>
            <td>${coffee["Recipe: Temperature (°C)"] || ''}</td>
          `;
          
          tbody.appendChild(row);
        });
      });
  </script>

</body>
</html>
