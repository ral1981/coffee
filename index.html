<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Overview</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 10px; /* Reduced padding for smaller screens */
      background-color: #f9fafb;
      color: #1f2937;
      font-size: 16px; /* Increased base font size */
      margin: 0; /* Ensure no default body margin interferes */
    }
    h1 {
      color: #374151;
      text-align: center;
      margin-top: 20px; /* Ensure some space above h1 if body padding is small */
      margin-bottom: 20px; /* Adjusted margin */
      font-size: 1.75rem; /* Responsive font size for h1 */
    }
    .table-container {
      overflow: auto; /* Handles horizontal scrolling if table is wider */
      /* overflow-y: auto; Explicitly for vertical scrolling; auto on its own handles this */
      max-height: 75vh; /* Constrains the height, making it scrollable if content exceeds this */
      max-width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      margin-left: auto; /* Center the table container if page is wider */
      margin-right: auto; /* Center the table container if page is wider */
      /* Adjust max-width if you want to constrain width on larger screens, e.g., max-width: 1200px; */
    }
    table {
      border-collapse: collapse;
      width: max-content; /* Allows table to be as wide as its content */
      min-width: 100%; /* Ensures table takes full width of its container */
    }
    th, td {
      padding: 14px 18px; /* Increased padding */
      border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
      text-align: left;
      font-size: 0.95rem; /* Slightly larger font for table cells */
    }
    thead th {
      position: sticky;
      top: 0; /* Stick to the top of the .table-container */
      background: #f3f4f6; /* Light gray background for header */
      padding: 14px 18px; /* Increased padding */
      border-bottom: 2px solid #9ca3af; /* Darker border for header bottom */
      font-weight: 600; /* Bolder text for headers */
      z-index: 2; /* Ensures header is above table body but below sticky corner */
      font-size: 1rem; /* Larger font for headers */
    }
    /* The first th in thead (Name cell) needs to be sticky left and top */
    thead th.sticky-col.sticky-header {
      left: 0; /* Stick to the left */
      z-index: 3; /* Highest z-index to be on top of other headers and sticky column cells */
      /* Background is already #f3f4f6 from thead th and .sticky-header */
    }
    /* General sticky column styling for td elements in tbody */
    .sticky-col {
      position: sticky;
      left: 0; /* Stick to the left of the .table-container */
      background-color: #ffffff; /* Default background for sticky column cells */
      z-index: 1; /* Above normal cells but below header cells */
      border-right: 1px solid #e5e7eb; /* Visual separator for the sticky column */
    }

    /* Ensure colored rows also color their sticky column cell */
    .in-green .sticky-col {
      background-color: #d1fae5; /* Match green row background */
    }
    .in-grey .sticky-col {
      background-color: #f3f4f6; /* Match grey row background */
    }
    /* Hover effect for rows, including their sticky column cell */
    tbody tr:hover {
      background-color: #e5e7eb; /* Light grey hover for rows */
    }
    tbody tr:hover .sticky-col {
        background-color: #e5e7eb; /* Ensure sticky column matches hover */
    }

    .in-green {
      background-color: #d1fae5;
    }
    .in-grey {
      background-color: #f3f4f6;
    }
    tbody td {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
    }
    .icon-link {
      text-decoration: none;
      margin-left: 8px;
      vertical-align: middle;
    }
    .icon-link svg {
        display: inline-block;
        width: 18px;
        height: 18px;
    }
	  
    /* Larger icons for green and grey container rows */
    .in-green .icon-link svg,
    .in-grey .icon-link svg {
    width: 84px;
    height: 84px;
    }

    /* Uniform row height to accommodate larger icons */
    tbody tr {
    height: 90px; /* Adjust if needed for visual balance */
    }

    /* Responsive adjustments for smaller screens */
    @media (max-width: 768px) {
      body {
        font-size: 15px;
        padding: 15px;
      }
      h1 {
        font-size: 1.5rem;
      }
      .table-container {
        max-height: 80vh; /* Allow a bit more height on tablets */
      }
      th, td {
        padding: 10px 12px;
        font-size: 0.9rem;
      }
      thead th {
        padding: 10px 12px;
        font-size: 0.95rem;
      }
       .icon-link svg {
        width: 16px;
        height: 16px;
    }
    }

    @media (max-width: 480px) {
      body {
        font-size: 14px;
        padding: 10px;
      }
      h1 {
        font-size: 1.3rem;
      }
      .table-container {
        max-height: 85vh; /* Allow more height on small mobile screens */
        border-radius: 8px; /* Slightly smaller radius for smaller screens */
      }
      th, td {
        padding: 8px 10px;
        font-size: 0.85rem;
      }
      thead th {
        padding: 8px 10px;
        font-size: 0.9rem;
      }
      .icon-link svg {
        width: 14px;
        height: 14px;
      }
    }
  </style>
</head>

    fetch(sheetUrl)
      .then(response => {

        if (!response.ok) {
          throw new Error('Network response was not ok ' + response.statusText);
        }
        return response.text(); // Get the response body as text

        // Parse the CSV data using PapaParse
        const parsed = Papa.parse(csv, { header: true }); // `header: true` uses the first row as keys

            <td>${coffee["Flavor"] || ''}</td>
            <td>${coffee["Recipe: Ratio"] || ''}</td>
            <td>${coffee["Recipe: In (gr)"] || ''}</td>

          // Append the newly created row to the table body
          tbody.appendChild(row);
        });
      })
      .catch(error => {
        // Log any errors that occur during fetch or parsing
        console.error('Error fetching or parsing coffee data:', error);
        const tbody = document.getElementById('coffee-body');
        if (tbody) {
            const row = tbody.insertRow();
            const cell = row.insertCell();
            cell.colSpan = 15; // Span all columns
            cell.textContent = 'Error loading coffee data. Please check the console for details.';
            cell.style.textAlign = 'center';
            cell.style.padding = '20px';
            cell.style.color = 'red';
        }
      });
  </script>

</body>
</html>
