<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Tracker</title>
    <link 
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <header>
        <svg 
            xmlns="http://www.w3.org/2000/svg" 
            width="86" 
            height="86" 
            viewBox="0 0 341 371"
            fill="#8b5cf6"
            fill-rule="evenodd"
            class="header-logo"
            aria-hidden="true">
            <path d="M213.075 27.087C185.896 32.42 161.888 52.692 147.45 82.5c-10.013 20.673-14.112 41.13-13.193 65.84.977 26.268 8.359 49.811 21.965 70.048 4.941 7.349 20.607 23.277 26.55 26.993 14.334 8.964 25.253 12.625 39.78 13.338 24.303 1.193 44.557-7.003 63.115-25.538 19.098-19.075 31.119-46.31 34.331-77.783 2.398-23.496-2.883-53.223-13.079-73.621-11.062-22.127-29.464-40.846-48.419-49.249-13.091-5.803-32.021-8.071-45.425-5.441m-2.674 23.33c-13.511 4.705-24.808 13.097-33.722 25.051-25.849 34.665-28.448 85.487-6.378 124.703 9.867 17.532 26.095 31.092 42.241 35.298 9.387 2.445 23.143 2.022 32.11-.988 33.507-11.248 56.215-52.005 54.034-96.981-.735-15.156-2.816-25.253-7.905-38.365-9.106-23.463-25.704-41.15-45.349-48.325-4.375-1.598-8.819-2.258-16.932-2.515-9.668-.307-11.86-.05-18.099 2.122m3.725 25.333c-7.125 14.115-10.088 30.31-8.2 44.822 2.146 16.487 5.319 24.458 17.566 44.123 2.463 3.953 3.059 6.115 3.367 12.195.453 8.965-.821 13.597-5.388 19.58l-3.472 4.548 6.743 8.607 6.743 8.607 4.308-4.866c9.979-11.272 14.676-26.93 12.536-41.791-1.09-7.56-5.838-19.331-9.309-23.075-2.556-2.758-8.433-14.947-10.123-21-2.298-8.226-1.833-25.676.896-33.604 1.25-3.632 2.919-7.457 3.708-8.5s1.45-2.38 1.467-2.971c.026-.861-7.531-6.185-16.619-11.707-.905-.55-2.16.946-4.223 5.032M103 124.705c-28.164 4.869-53.049 26.296-62.479 53.795-9.564 27.888-8.038 58.156 4.44 88.119 12.401 29.776 35.352 54.939 62.65 68.685 23.966 12.069 51.806 14.07 73.552 5.286 17.599-7.108 33.282-21.675 42.092-39.097 2.704-5.347 7.092-17.94 8.069-23.158l.592-3.165-9.708-1.71c-5.339-.94-10.08-1.766-10.534-1.835s-1.832 3.25-3.061 7.375c-8.294 27.841-27.486 43.6-54.538 44.784-14.865.65-25.007-1.849-39.845-9.818-23.538-12.642-43.946-37.698-52.507-64.466-4.586-14.34-5.211-18.432-5.197-34 .012-12.554.382-16.282 2.272-22.862 5.631-19.611 16.156-33.196 31.787-41.029C96.249 148.77 105.942 146 110.21 146c2.617 0 2.79-.264 2.783-4.25-.004-2.338-.294-7.287-.645-11l-.637-6.75-3.106.136c-1.708.075-4.23.331-5.605.569M89.018 17         </svg>
        <p class="subtitle">Specialty Coffee Beans</p>
    </header>
    <div class="add-coffee-section">
        <div class="add-coffee-container">
            <button aria-expanded="false"
                  class="add-coffee-toggle"
                  disabled
                  id="add-coffee-toggle">
                     <span>Add Coffee</span>
            </button>            
            <div class="add-coffee-content collapsed"
                 id="add-coffee-content">
                <div class="add-coffee-grid">
                    <form id="add-coffee-form"
                          name="add-coffee-form">
                        <div class="form-sections">
                            <!-- Basic Information Section -->
                            <div class="form-section">
                                <h3>Basic Information</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Container</label>
                                        <div class="container-checkboxes">
                                            <label><input type="checkbox" id="add-green-container" name="in_green_container" value="true"> Green Container</label>
                                            <label><input type="checkbox" id="add-grey-container" name="in_grey_container" value="true"> Grey Container</label>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="add-name">Coffee Name <span class="required">*</span></label> <input id="add-name"
                                             name="name"
                                             placeholder="Enter coffee name"
                                             required=""
                                             type="text">
                                    </div>
                                </div>
                            </div><!-- Shop Information Section -->
                            <div class="form-section">
                                <h3>Shop Information</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-shop-name">Shop Name <span class="required">*</span></label> <input id="add-shop-name"
                                             name="shop_name"
                                             placeholder="Enter shop name"
                                             required=""
                                             type="text">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-shop-url">Shop URL <span class="required">*</span></label> <input id="add-shop-url"
                                             name="shop_url"
                                             placeholder="https://example.com"
                                             required=""
                                             type="url">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-shop-logo">Shop Logo URL (Favicon)</label>
                                        <div class="favicon-input-container">
                                            <input id="add-shop-logo"
                                                 name="shop_logo"
                                                 placeholder="Auto-populated from Shop URL"
                                                 readonly
                                                 type="url">
                                            <div class="favicon-preview"
                                                 id="favicon-preview">
                                                <img alt="Favicon"
                                                     id="favicon-img"
                                                     onerror="this.style.display='none'"
                                                     src=""
                                                     style="display: none;"> <i data-lucide="image"
                                                     id="favicon-placeholder"
                                                     style="width: 16px; height: 16px; color: #9ca3af;"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div><!-- Origin Information Section -->
                            <div class="form-section">
                                <h3>Origin Information</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-origin">Origin <span class="required">*</span></label> <input id="add-origin"
                                             name="origin"
                                             placeholder="e.g., Ethiopia"
                                             required=""
                                             type="text">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-region">Region</label> <input id="add-region"
                                             name="region"
                                             placeholder="e.g., Yirgacheffe"
                                             type="text">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-height">Height (m)</label> <input id="add-height"
                                             name="height_m"
                                             placeholder="e.g., 1800"
                                             type="number">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-variety">Botanic Variety</label> <input id="add-variety"
                                             name="botanic_variety"
                                             placeholder="e.g., Heirloom"
                                             type="text">
                                    </div>
                                </div>
                            </div><!-- Production Information Section -->
                            <div class="form-section">
                                <h3>Production Information</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-farm">Farm / Producer</label> <input id="add-farm"
                                             name="farm_producer"
                                             placeholder="Enter farm or producer name"
                                             type="text">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-processing">Processing Method</label> <input id="add-processing"
                                             name="processing_method"
                                             placeholder="e.g., Washed, Natural"
                                             type="text">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-sca">SCA Score</label> <input id="add-sca"
                                             max="100"
                                             min="0"
                                             name="sca"
                                             placeholder="e.g., 85.5"
                                             step="0.1"
                                             type="number">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-flavor">Flavor Profile</label> 
                                        <textarea id="add-flavor"
                                             name="flavor"
                                             placeholder="Describe the flavor notes"
                                             rows="2"></textarea>
                                    </div>
                                </div>
                            </div><!-- Recipe Information Section -->
                            <div class="form-section">
                                <h3>Espresso Recipe (double shot)</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-recipe-in">In (gr)</label>
                                        <input id="add-recipe-in"
                                               name="recipe_in_gr"
                                               placeholder="18"
                                               step="0.1"
                                               type="number">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-recipe-out">Out (gr)</label> <input id="add-recipe-out"
                                             name="recipe_out_gr"
                                             placeholder="36"
                                             step="0.1"
                                             type="number">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-recipe-ratio">Ratio (auto-calculated)</label> <input id="add-recipe-ratio"
                                             name="recipe_ratio"
                                             placeholder="1:2"
                                             readonly
                                             type="text">
                                    </div>
                                    <div class="form-group">
                                        <label for="add-recipe-time">Time (s)</label> <input id="add-recipe-time"
                                             name="recipe_time_s"
                                             placeholder="28"
                                             type="number">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="add-recipe-temp">Temperature (?C)</label> <input id="add-recipe-temp"
                                             name="recipe_temperature_c"
                                             placeholder="93"
                                             type="number">
                                    </div>
                                </div>
                            </div><!-- Form Actions -->
                            <div class="form-actions">
                                <button class="btn-cancel"
                                     type="button">Cancel</button> 
                                <button class="btn-submit"
                                     type="submit"> Add Coffee</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="filters-section">
        <div class="filters-container">            
                <button aria-expanded="false" id="toggle-filters-btn" class="toggle-filters-btn">
                        <i data-lucide="funnel"></i>
                        Filter Coffee Collection
                </button>
                    <div class="filters-content collapsed"
                        id="filters-content">                
                    <div class="filters-grid">
                    <div class="filter-group">
                        <label for="container-filter"><i data-lucide="funnel"></i>
                            Container:
                        </label>
                        <select id="container-filter">...</select>
                    </div>
                    <div class="filter-group">
                        <label for="shop-filter"><i data-lucide="funnel"></i>
                            Shop:
                        </label>
                        <select id="shop-filter">...</select>
                    </div>
                    <div class="filter-group">                        
                        <label for="origin-filter"><i data-lucide="funnel"></i>
                            Origin:
                        </label>
                        <select id="origin-filter">...</select>
                    </div>
                    <div class="filter-group">
                        <button class="clear-filters-btn" id="clear-filters-btn" disabled>
                            <i data-lucide="funnel-x"></i>
                            Clear All Filters
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="results-count"
         id="results-count"></div>
    <div class="coffee-grid"
         id="coffee-grid">
        <!-- Coffee cards will be populated by JavaScript -->
    </div>
    <div class="no-results"
         id="no-results"
         style="display: none;">
        <h3>No coffee found</h3>
        <p>Try adjusting your filters to see more results.</p>
    </div>
    <button aria-label="Back to top" class="back-to-top" id="back-to-top">
        <i data-lucide="arrow-up"></i>
    </button>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script> 
    <script> lucide.createIcons();</script>
    <script type="module" src="main.js"></script>
</body>
</html>
