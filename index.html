<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coffee Notes</title>
</head>
<body>

  <!-- Demo note field -->
  <textarea id="notes-input-0" placeholder="Write your coffee notes..."></textarea>
  <button onclick="saveNotes(0)">Save Notes</button>

  <!-- Login section -->
  <input type="email" id="email-input" placeholder="Enter your email" />
  <button onclick="signIn()">Send Login Link</button>

  <!-- Load Supabase library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    // ✅ Initialize Supabase client
    const supabase = supabase.createClient(
      'https://vrasvqmlpdqogghtkqfu.supabase.co', // replace with your project URL
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyYXN2cW1scGRxb2dnaHRrcWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTAzNTQ5ODgsImV4cCI6MjA2NTkzMDk4OH0.K5wuITvCrQdCvfsRRpWZnFtZ3cvHLAdXhudBxiP9hAc' // replace with your public anon key
    );

    // ✅ Demo data
    const filteredCoffees = [
      { id: 'YOUR-BEAN-ID-HERE' } // Replace with real UUID from your DB
    ];
    const allCoffees = [...filteredCoffees];

    // ✅ Auth: Sign in with magic link
    async function signIn() {
      const email = document.getElementById('email-input').value;
      const { error } = await supabase.auth.signInWithOtp({ email });
      if (error) {
        alert('Error: ' + error.message);
      } else {
        alert('Magic link sent! Check your inbox.');
      }
    }

    // ✅ Save notes securely with access token
    async function saveNotes(coffeeIndex) {
      const notesInput = document.getElementById(`notes-input-${coffeeIndex}`);
      const newNotes = notesInput.value.trim();
      const coffeeId = filteredCoffees[coffeeIndex].id;

      const { data: { session }, error } = await supabase.auth.getSession();
      if (!session) {
        alert('Please log in to save notes.');
        return;
      }

      const accessToken = session.access_token;

      const response = await fetch('http://localhost:3000/api/coffee-beans/notes', {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${accessToken}`
        },
        body: JSON.stringify({ id: coffeeId, notes: newNotes })
      });

      const result = await response.json();
      console.log('Server response:', result);

      if (result.success) {
        alert('Notes saved successfully!');
      } else {
        alert('Error saving notes: ' + result.error);
      }
    }
  </script>

</body>
</html>
